<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アクセス・所在地｜横浜市旭区の本社所在地・地図｜有限会社晃和運輸</title>
  <meta name="description" content="横浜市旭区にある有限会社晃和運輸へのアクセス・地図情報です。本社営業所、および車庫のGoogleマップを掲載。保土ヶ谷バイパス「下川井IC」より車で2分、相鉄線・横浜線からの各種アクセス方法をご案内します。" />
  <link rel="canonical" href="https://kowa-yokohama.com/access" />

  <link rel="stylesheet" href="css/styles.css" />

  <style>
    /* ==========================================================================
       アクセスぺージ専用スタイル（濃い青：primary-blue 基調に変更）
    ========================================================================== */
    .access-section {
      padding: 10px 0 100px;
    }

    /* 地図と住所のカードレイアウト（2カラム） */
    .map-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
      margin-bottom: 60px;
    }

    .map-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(95, 97, 236, 0.2); /* 濃い青に変更（rgbaは手動指定） */
      border-top: 4px solid var(--primary-blue); /* 濃い青に変更 */
      border-radius: 8px;
      padding: 32px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .map-card:hover {
      box-shadow: 0 10px 30px rgba(95, 97, 236, 0.2); /* 濃い青の光彩に変更 */
      transform: translateY(-4px);
      border-color: rgba(95, 97, 236, 0.6);            /* 濃い青に変更 */
    }

    .map-title {
      font-size: 1.4rem;
      font-weight: 900;
      color: #bcbbfa; /* 濃い青だと背景に沈むため、見出し用には少し明るいブルー（水色）をアクセントとして使用 */
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 0.05em;
    }

    .map-address {
      color: var(--text-main);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .map-address span {
      color: var(--text-muted);
      font-size: 0.9rem;
      display: block;
      margin-bottom: 4px;
    }

    /* Googleマップ埋め込み枠 */
    .gmap-wrapper {
      position: relative;
      width: 100%;
      padding-top: 65%;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .gmap-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      filter: invert(90%) hue-rotate(180deg) contrast(100%);
    }

    /* ==========================================================================
       図解デザイン：交通アクセス
    ========================================================================== */
    .transport-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }

    .transport-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(95, 97, 236, 0.2); /* 濃い青に変更（rgbaは手動指定） */
      border-top: 4px solid var(--primary-blue); /* 濃い青に変更 */
      border-radius: 8px;
      padding: 40px;
    }

    .transport-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
      padding-bottom: 16px;
    }

    .transport-icon {
      color: #bcbbfa; /* 明るいブルーに変更 */
    }

    /* --- 車ルート：路線ごとのグループ化 --- */
    .route-group {
      margin-bottom: 24px;
    }
    .route-group:last-child {
      margin-bottom: 0;
    }
    .route-group-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .route-group-name::before {
      content: '';
      display: block;
      width: 4px;
      height: 14px;
      background: var(--primary-blue); /* 濃い青に変更 */
      border-radius: 2px;
    }

    /* 横向き矢印ブロック */
    .route-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      margin-bottom: 8px;
      padding: 14px 16px;
      transition: background 0.3s ease;
    }
    .route-box:last-child { margin-bottom: 0; }
    .route-box:hover {
      background: rgba(0, 71, 133, 0.15);     /* 濃い青の背景に変更 */
      border-color: rgba(0, 71, 133, 0.4);      /* 濃い青の枠線に変更 */
    }

    .route-from {
      width: 32%;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-main);
      line-height: 1.4;
    }
    
    .route-arrow {
      width: 40%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 8px;
    }
    .route-time {
      font-size: 0.85rem;
      color: #f5f7fa; /* 明るいブルーに変更 */
      font-weight: 900;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .route-line {
      width: 100%;
      height: 3px;
      background: var(--primary-blue); /* 濃い青に変更 */
      position: relative;
      border-radius: 2px;
    }
    .route-line::after {
      content: '';
      position: absolute;
      right: -2px;
      top: -4px;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--primary-blue); /* 濃い青に変更 */
    }

    .route-to {
      width: 22%;
      font-weight: 900;
      color: #fff; /* 背景が濃い青なので文字は白に */
      text-align: center;
      background: #403dfe; /* 濃い青に変更 */
      padding: 8px 0;
      border-radius: 4px;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    /* --- バスルート：縦型タイムライン（乗り換え案内風） --- */
    .bus-timeline {
      padding: 16px 8px;
    }
    .tl-node {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 2;
    }
    .tl-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--bg-color);
      border: 4px solid var(--primary-blue); /* 濃い青に変更 */
      flex-shrink: 0;
    }
    .tl-text {
      font-size: 1.05rem;
      font-weight: 900;
      color: #fff;
    }
    .tl-text span {
      display: inline-block;
      font-size: 0.75rem;
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 2px;
      margin-right: 8px;
      font-weight: normal;
      color: var(--text-muted);
    }
    
    /* 目的地の特別スタイル */
    .tl-node.dest .tl-dot {
      background: var(--primary-blue); /* 濃い青に変更 */
      box-shadow: 0 0 10px rgba(164, 169, 174, 0.5); /* 濃い青の光彩に変更 */
    }
    .tl-node.dest .tl-text { color: #f1f1f5; /* 明るいブルーに変更 */ }

    .tl-path {
      margin-left: 7px; /* 16pxの円の中心に合わせる */
      border-left: 2px dashed rgba(0, 71, 133, 0.8); /* 濃い青に変更 */
      padding: 24px 0 24px 32px;
      position: relative;
    }
    .tl-path-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(165, 159, 245, 0.2); /* 濃い青に変更 */
      border: 1px solid rgba(0, 71, 133, 0.4); /* 濃い青に変更 */
      color: #f5f7f8; /* 明るいブルーに変更 */
      padding: 10px 16px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.9rem;
    }


    /* スマホ用レスポンシブ */
    @media (max-width: 768px) {
      .map-grid { grid-template-columns: 1fr; gap: 24px; }
      .map-card { padding: 24px 16px; }
      .gmap-wrapper { padding-top: 75%; }
      .transport-grid { grid-template-columns: 1fr; gap: 24px; }
      .transport-card { padding: 24px 16px; }
      
      .route-box { padding: 12px 8px; }
      .route-from { width: 38%; font-size: 0.85rem; }
      .route-arrow { width: 34%; }
      .route-time { font-size: 0.75rem; }
      .route-time svg { width: 14px; height: 14px; }
      .route-to { width: 22%; font-size: 0.75rem; padding: 8px 0; }
      
      .tl-text { font-size: 0.95rem; }
      .tl-path { padding: 20px 0 20px 24px; }
      .tl-path-label { font-size: 0.85rem; padding: 8px 12px; }
    }
  </style>
</head>
<body>
